<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <header>
        <h1 class="logo">Library</h1>
        <button id="add-btn" class="btn add-btn">Add New</button>
    </header>

    <main>
        <div class="library-section">
            <table class="book-table">
                <thead>
                    <tr>
                        <th scope="col">Title</th>
                        <th scope="col">Author</th>
                        <th scope="col">Genre</th>
                        <th scope="col">Read Status</th>
                        <th scope="col">Rating</th>
                        <th scope="col">Manage</th>
                    </tr>
                </thead>

                <tbody id="display-section">
                    <!--                     
                    <tr>
                        <td>Dude</td>
                        <td>Book</td>
                        <td>Fiction</td>
                        <td>
                            <button id="status-btn" class="btn" aria-label="Toggle Read Status">In Progress</button>
                        </td>
                        <td>5</td>
                        <td>
                            <button id="delete-btn" class="btn btn-delete" aria-label="Delete [book]">Delete</button>
                        </td>
                    </tr> 
                    -->
                </tbody>
            </table>
        </div>
    </main>

    <dialog id="book-modal">
        <h2>Add New Book</h2>
        <form method="dialog" id="book-form">
            
            <div class="form-control">
                <label for="title">Title</label>
                <input name="title" type="text" id="title" required>
            </div>

            <div class="form-control">
                <label for="author">Author</label>
                <input name="author" type="text" id="author" required>
            </div>

            <div class="form-control">
                <label for="genre">Genre</label>
                <select name="genre" id="genre" required>
                    <option value="" disabled selected>Select a genre...</option>
                    <option value="fiction">Fiction</option>
                    <option value="nonfiction">Non-Fiction</option>
                </select>
            </div>

            <div class="form-control">
                <label for="status">Read Status</label>
                <select name="status" id="status" required>
                    <option value="" disabled selected>Select progress...</option>
                    <option value="read">Read</option>
                    <option value="in-progress">In Progess</option>
                    <option value="not-read">Not Read</option>
                </select>
            </div>

            <div class="form-control">
                <label for="rating">Rating</label>
                <select name="rating" id="rating" required>
                    <option value="" disabled selected>Select number of stars...</option>
                    <option value="1">1 Star</option>
                    <option value="2">2 Stars</option>
                    <option value="3">3 Stars</option>
                    <option value="4">4 Stars</option>
                    <option value="5">5 Stars</option>
                </select>
            </div>

            <div class="form-actions">
                <button class="btn btn-delete" type="button" id="cancel-btn">Cancel</button>
                <button class="btn" type="submit">Add Book</button>
            </div>
        </form>
    </dialog>
</body>
</html>
